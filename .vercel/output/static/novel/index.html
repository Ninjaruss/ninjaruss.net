<link rel="stylesheet" href="/_astro/_slug_.Bm2Gh5Su.css"></head> <body> <div id="cursor" aria-hidden="true" data-astro-transition-persist="astro-tkg56a54-1"></div> <canvas id="transition-canvas" aria-hidden="true" data-astro-transition-persist="astro-3hf5eeq3-2"></canvas> <a href="#main-content" class="skip-link">Skip to content</a> <main id="main-content" class="page">  <nav class="nav-pill" data-astro-cid-qxdgtcv4><div class="nav-pill__inner" data-astro-cid-qxdgtcv4><a href="/" class="nav-pill__item nav-pill__home" title="Home" data-astro-cid-qxdgtcv4><span class="nav-pill__icon" data-astro-cid-qxdgtcv4>&#9670;</span><span class="nav-pill__text" data-astro-cid-qxdgtcv4>Home</span></a></div></nav> <canvas id="bg-canvas" aria-hidden="true"></canvas> <main class="novel-page"> <!-- Title block: Rain's afterimage motif --> <div class="title-block"> <div class="title-text-group"> <span class="title-main">Remember Rain</span> <span class="waterline" aria-hidden="true"></span> <span class="title-reflection" aria-hidden="true">Remember Rain</span> </div> </div> <!-- Category filter tabs --> <div class="filter-tabs" id="filter-tabs"> <button class="filter-tab" data-folder="characters" type="button" aria-pressed="false"> Characters <span class="tab-count">24</span> </button><button class="filter-tab" data-folder="locations" type="button" aria-pressed="false"> Locations <span class="tab-count">1</span> </button><button class="filter-tab" data-folder="lore" type="button" aria-pressed="false"> Lore <span class="tab-count">10</span> </button><button class="filter-tab" data-folder="themes" type="button" aria-pressed="false"> Themes <span class="tab-count">4</span> </button> </div> <!-- Two-panel navigator: populated by JS --> <div class="novel-panels"> <div class="novel-sidebar" id="novel-sidebar"></div> <div class="novel-content" id="novel-content"></div> </div> </main> <script type="application/json" id="novel-tree">{"characters":{"slug":"characters","title":"Characters","files":[],"subfolders":{"claire":{"slug":"claire","title":"Claire","files":[{"slug":"claire-abilities","title":"Claire - Abilities","body":"<p>Passive – Calculus Drift: Intrusive noise of worst‑case scenarios.</p>\n<p>Active – Visual Calculus: Processes information at superhuman speed to find one perfect trajectory; everything goes silent, then a “click.” </p>\n<p>Cost: metabolic crash (brain glucose depletion) → tremors, cold sweats, collapse.</p>\n<p>Advanced – Certainty Field: A small zone of quiet certainty; no metabolic crash. Practically looks like “ultra instinct” where projectiles entering her zone are near instantaneously reacted to.</p>\n<p>Cost: transforms to emotional regulation — the zone destabilises if she panics.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","claire","claire-abilities"]},{"slug":"claire-layer-table","title":"Claire - Layer Table","body":"<p>Layer 1 (Calculating): Peaceful, slight smile, silent focus. </p>\n<p>Bright, transparent.</p>\n<p>Layer 1 (Crashing): Tremors, slurring, collapse. </p>\n<p>Dark, transparent.</p>\n<p>Layer 2 (Situational): Demands more data, delays action, withdraws into mental simulations. </p>\n<p>Mid‑dark, semi‑obscure.</p>\n<p>Layer 3 (Foundational): Guilt over a failed prediction; fear of uselessness. “Certainty is safety.” </p>\n<p>Dark, obscure.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","claire","claire-layer-table"]},{"slug":"claire-seed","title":"Claire - Seed","body":"<p>## Expression</p>\n<p>Claire represents the idea of being so filled with thoughts that would normally make you overthink any given situation, but because Claire adapted to her mind, she is able to calculate solutions to absurd issues. I think of her as the “perfect” version of overthinking where it can be utilized in such a way that she can accomplish extraordinary things through her racing mind. I realize that this is very similar to the character Bullseye from Daredevil, where they both are extremely intelligent people that become extremely flawed due to their talents. For Claire, I haven’t truly established what her flaw is outside of simple overthinking. I am considering a pivot to make her more of a very talented character but is plagued by a constant worry for others around her. Because she is so talented, the difference in processing and more often than not awareness by others have delineated her from most people. The origin for what I am building this character from is simply the want to make a character that can shoot bullets out of the air as her immediate appeal for the introduction of her character. </p>\n<p>Elements of myself that I wanted to include was more of an extreme version of my own overthinking and constant hesitation when deciding what to do. I myself often have to do long sessions of research when picking the “best” piece of technology to buy or considering all my options for any given scenario. An idea I’m kind of interested in implementing is the idea that Claire is addicted to the overthinking. Maybe not directly, but similar to my constant need to be making an informed (or really justifiable/reasonable) decision, she goes overboard with what she spends her focus on. </p>\n<p>Considering her ability is practically visual calculus with a execution program (basically, she can make predictions and preprogram immediate actions to complete her task), I was thinking her ability evolves into a more passive or subconscious calculation she doesn’t worry about. Her ability is one I am still trying to fine tune, but the key points are that she should be able to calculate trajectories at an extreme pace for a set (calculated) time, then she executes all actions perfectly based on the calculations and her intent. In a sense, she is also the embodiment of my own perfectionism. However, my own perfectionism is more of a fear of losing potential rather than perfecting the thing itself which I am not sure would need to be integrated to Claire (since Rain is an analogue for myself).</p>\n","created":"April 8, 2026","modified":"May 23, 2026","path":["characters","claire","claire-seed"]},{"slug":"claire-trait-pair","title":"Claire - Trait Pair","body":"<p>Main: Perfectionist</p>\n<p>Passive: Addict (chases silence)</p>\n<p>Tag: The Certainty Junkie</p>\n<p>Abstract Role: Mind</p>\n<p>Age: 21-22</p>\n<p>Height: 5’10”</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","claire","claire-trait-pair"]}],"subfolders":{}},"rain":{"slug":"rain","title":"Rain","files":[{"slug":"rain-abilities","title":"Rain - Abilities","body":"<p>Passive: Ghost</p>\n<p>- Afterimage visible only to Rain.</p>\n<p>- Appears at thresholds between commitment and retreat.</p>\n<p>- Repeats a single gesture: step forward, open hand.</p>\n<p>- Shows authentic desire, not safe path.</p>\n<p>- Rain has spent years misreading it.</p>\n<p>- Does not require artifact.</p>\n<p>- Does not react to the Clone.</p>\n<p>Active: Clone (awakens during inciting incident)</p>\n<p>- Intangible, distinguishable copy.</p>\n<p>- Performs single action based on intent.</p>\n<p>- Requires goggles (artifact) to activate.</p>\n<p>- Cost: Sensory deprivation scaling with duration.</p>\n<p>Blurred vision → ringing ears → blindness/deafness → collapse.</p>\n<p>Short-term memory loss in extreme use?</p>\n<p>Recovery: 10–30 seconds after dismissal.</p>\n<p>*The Clone can create an illusionary copy of a thrown object</p>\n<p>as part of its single action. The object appears to fly and</p>\n<p>strike but causes no physical effect. Intangible, silent,</p>\n<p>vanishing on contact or shortly after.</p>\n<p>Advanced: Perfect Clone (awakens near climax)</p>\n<p>- Indistinguishable from Rain. Still intangible.</p>\n<p>- No immediate sensory cost.</p>\n<p>- Deferred cost: Each use deepens the distinctiveness of his internal voice (procrastinator self-talk); turning into an almost separate character that grows more distinct, persuasive, and autonomous. His old self, refusing to die quietly.</p>\n<p>- Consequences only hinted at; to be explored in a future arc/sequel</p>\n<p>*Only Rain’s base Clone transforms into Perfect Clone; he cannot go back?</p>\n<p>His active ability involves sending a proxy of himself to do an action he’d like to do, but is intangible and cannot actually do anything, which relies on him to do the actions himself. This is an expression of the procrastinator trait.</p>\n<p>While his passive ability is the ghost that guides him towards what he truly wants to do in spite of any risks or consequences. This is an expression of the dreamer trait.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","rain","rain-abilities"]},{"slug":"rain-artifact","title":"Rain - Artifact","body":"<p>Goggles </p>\n<p>- found near the location of the inciting incident.</p>\n<p>- wearing them sharpens the appearance of the Ghost</p>\n<p>- does not inherently improve his vision; lenses replaced during the story to fit his prescription (near sighted)</p>\n<p>Possible memory:</p>\n<p>Goggles worn by a worker who refused to continue working in spite of his whole life built by his work? Not sure; needs further exploration</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","rain","rain-artifact"]},{"slug":"rain-character-chain","title":"Rain - Character Chain","body":"<p>## Character Chain</p>\n<p>History\tGifted praise, discouraged dreams, waiting for permission.</p>\n<p>Interpretation (Lie)\t<strong>My worth comes from my infinite potential, not from anything I actually do. The moment I commit to one path, I become finite – and finite means I might fail.</strong></p>\n<p>Motivation (Fear &amp; Fix)\t</p>\n<p>- Fear: That choosing one finite path will prove he’s not special and will kill all his other potential selves.</p>\n<p>- Fix: Avoid commitment by staying in preparation mode, seeking perfect certainty, and using proxies (the clone) to act at a distance.</p>\n<p>Behavioral Pattern\tAnalysis, waiting, using clones as proxy, retreating into comfort. Dislikes ordinary tasks and defers them until they need to be addressed.</p>\n<p>Boundary\t“I will not let anyone else define my story or erase my memories.”</p>\n<p>Collision\tFollows the ghost without permission, becomes a fugitive from him taking action, forced to act without certainty.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","rain","rain-character-chain"]},{"slug":"rain-layer-table","title":"Rain - Layer Table","body":"<p>Layer 1 (Immediate): “I’m fine.” Quiet, polite, deflective. </p>\n<p>Slightly dark, transparent.</p>\n<p>Layer 2 (Situational): Requires authenticity - cannot act until the choice feels truly his. Avoids commitment, uses the Clone as proxy. </p>\n<p>Mid-bright, obscure.</p>\n<p>Layer 3 (Foundational): Believes his potential is his truest self. The untested dream is perfect; committing might prove he’s ordinary. Carries a silent notebook. Very bright, very obscure.</p>\n","created":"May 18, 2026","modified":"May 23, 2026","path":["characters","rain","rain-layer-table"]},{"slug":"rain-seed-1","title":"Rain - Seed 1","body":"<p>I want to express this issue where I want to become someone that can create without restraint. Or basically, someone who wants to become their true authentic self, but is unable to access it.</p>\n<p>This character is a splitting image of myself in figuring out the core struggle that is preventing me from writing this book or doing anything at all. I am getting distracted by all the comforts I have in my life. Not only that, but I feel a sense of longing to create something meaningful even though I continue to drift. I sometimes wonder if that’s due to my built up behaviors over the years and that at this point, something crazy needs to happen in order to change everything</p>\n<p>I know that incremental changes are what is needed, but it seems I continue to fall back into my old identity of continuing the same routines. I’ve identified that my path moving forward will require me to uproot myself and move to Japan. Obviously, a change like this will not solve my issues, but I believe that it will give me greater opportunity to challenge myself without anything else holding me back. Or better yet, no safety nets to fall back on. </p>\n<p>Intellectually, I know this is the move. There are numerous reasons that I feel moving to Japan is the move. Not necessarily because it’s more comfortable there, but really that everything will be so much more aligned with myself that I can see the potential growth I can accomplish when I get there. As I said before, intellectually I know this and intellectually I know this is all based on assumptions that I will never truly know until I try. However, there seems to be a lingering feeling that makes me afraid of the consequences of my actions. For example, telling my parents my plan has revealed just how much they are stuck in their beliefs and how utterly hopeless it will be to convince them that this is the path I must take. All I want is for them to recognize that they’ve done more than enough for me and that I need to walk my own path that will not make their efforts in vain. However, what ends up happening is that my dad threatens to do this and that while my mom seems to attempt to guilt trip me. I know this is due to their love for me and their own psychological problems, but it makes me suffer so much. Yet, I continue to put up with this and begin to fall back into old habits. </p>\n<p>So a key detail I am exploring is this idea that I want to pursue my own individuality. Or rather, to focus on pushing myself out of my comfort zone and to do the things I would think were improbable. Like learning Japanese and moving to Japan or writing a meaningful novel. I followed the script of going down the relatively safe path for far too long (completing university, getting a stable job, staying home). In a sense, I’ve suppressed a big portion of myself unconsciously. Even though I do things that progressed towards my dreams, they would either not be completed or were put off after a period of time. Instead of following all these typical routes, I should follow my instincts and try doing more that fulfills me and gives me joy. The issue is, as I decide to go down these routes that follow myself, they begin to reveal all of the walls that have kept me in this mindset. </p>\n<p>My parents are not to blame; however, they do represent a key boundary in my mind that is limiting my sense of freedom. I do these little actions to change parts of myself to become better, but they never recognize these changes as all of them are usually internal and I don’t consistently show them externally. What really hurts me is that they interpret all of these behaviors from me as insolence and selfish. They never listen to what I actually want; almost as if they cannot recognize I am my own individual that can have differing beliefs and actions different from them. I’ve always felt that I need to be the one that fixes my own issues. It is to always ensure that I am secure and that I do what’s best for the family. </p>\n<p>At the end of the day, I set my own limits whether consciously or subconsciously. I have to accept the fact that in order to become truly me, I need to let go of my old identity and the things I’ve used as excuses to not do the things I truly want. Because of this, I think that I will be seen as something similar to a fugitive; a person who has attempted to break the current system and is being actively hunted down to stop their efforts. </p>\n<p>That’s probably what my main story will revolve around on. Rain will make a seemingly simple decision that leads to a life altering decision that will make him a fugitive (at least in the eyes of the public and his family). Internally and in the sense of the grand scheme of things, he is doing the courageous thing even if he doesn’t truly understand the full consequences of his decisions. Once he fully realizes himself and that he can just be truly present without waiting for some sort of self understanding threshold, Rain will become unstoppable internally. He will then be an “actual” fugitive that becomes a key individual for change. I sort of want him to feel like he isn’t a fugitive (since his actions were seemingly reasonable to himself) and that he must clear his name, but by the end of the story becomes someone who allows himself to just be. What is important to the story is that I feel like I am missing a key to becoming my greatest self and that I feel like I could make it into reality. But to actually enact the changes and to overcome the self limits is so difficult that it feels you need some sort of push from your environment or someone to guide you. What becomes apparent is that you cannot rely on some miracle or person to provide you the actions to overcome your circumstances. It is that you are you is what makes the difficulty of overcoming your own set of circumstances is what makes for a compelling story. And if you continue to ignore the call from your “silent” sub conscious, it will lead you down a life of constant regret where your life doesn’t really change significantly and you fade into the background of humanity. </p>\n<p>A thing I am not sure how to tackle is if it is the duty of every single person to push the bounds of humanity? Like, do people need to create something great that helps others or do you need to reach your own enlightenment first? For example, how truly helpful is it for a singular person’s actions will actually change their world and the people around them? Is it merely a stopgap or mitigation strategy or is it the key to actually creating change? I feel like it’s the latter, but how do I convince the antagonist that this is possible and the ideal outcome is difficult. There are so many inefficiencies and so much meandering that you start to question if you had the option to bypass all that, would you? Would it be better for society if we just solved these things and allowed others to essentially bypass the directionless or inconsistent state that most people are in?</p>\n<p>I myself have changed a lot over the past few years even though I still feel like the same person. A lot of these changes in mindset, identity, and so on aren’t very apparent to others and even to myself sometimes. There is this sense that my “self” remembers everything that has shaped me even though there is no tangibility or clear memory for every single thing that has affected me. </p>\n<p>Now, I am trying to figure out why I am attracted to the idea of theming the story around the concept of memories. I believe there are a few things that are really interesting that I want to explore that memories being a key point makes things interesting. For one, experiences are the most important thing that allows someone to change. Now what if those experiences can be altered or removed? That’s the core idea that I want to explore with my antagonist Vesper (name pending).  He is someone who was similar to Rain in that he was also stuck in life even though he had everything going for him. However, for Vesper, his actions ultimately resulted in a tragedy that makes him believe that the only way for people to change is to forcibly change people himself. This touches on the idea that I believe people only change when placed in a situation that requires them to adapt. I noticed while pushing carts that most people aren’t inherently malicious when they placed the carts in inconvenient places. They usually do these things based on how they were taught by society and/or they don’t have or want to spend the time to consider the consequences of their actions. So if they don’t want to spend the time to consider the consequences, they won’t mind if I erase the experiences/memories that cause them to act in this incorrect way. For the betterment of society and supposedly for the person altered. Vesper is similar to Rain in that they both felt they were in a state of stagnation and couldn’t do what they want because they felt something was missing or was stopping them internally. </p>\n<p>Basically, the significance of what you should remember or forget. Rain, although he is forgetful in some of the mundane things in life like where he places his things, he continue to remember (or rather cling to) he is not currently worthy enough to create his dreams into reality. Meanwhile, Vesper can remember every single thing that has happened to his life, but neglects himself and forgets to see what truly matters. Vesper is a more “realistic” version of myself in the sense that he sees humanity’s flaws as something that must be corrected. Like seeing a hyper individualized society as a problem as it promotes selfishness and forces people to only think for themselves. Whereas I choose to be more like Rain, a person who continues to dream and believe that the flaws are made to be overcome despite how much difficulty there is in actually achieving these dreams. The issue is, intellectually, I believe in Rain’s philosophy, but I feel more like Vesper’s philosophy way too often in the unconscious sense. I am saying that even though I think it is better to be hopeful, it’s hard to actually feel that way especially in those days where it feels you have no control over yourself. That’s the reason why I believe Vesper’s proposed solution is very compelling for those who have not had that sort of unwavering belief or have felt how beautiful the human spirit is. Vesper begs the question to what if we were able to control our own memories and manipulate them to improve ourselves? If that was possible, would you choose to forget these negative memories that limit our own actions? I’ve felt that perhaps if I were able to fix the behavioral or psychological problem within my own psyche, would I then be unencumbered and will become my truest self?</p>\n<p>Vesper believes memory, especially painful ones, are the issue that needs to be fixed. Usually, forceful change is required to change someone; however, the issue is that it removes (forgets?) the actual struggle that was required for someone to change. Rain does remember what he needs to do and is clung to his habits; he needs to act and let go of having to prove himself.</p>\n<p>While Rain and Vesper are mirrors to each other, Roxana and Claire are more of the ideals I myself would like to follow, but with included drawbacks for their extreme level of competence. Claire is the prime example of someone who can do the (visual) calculus of predicting all potential issues and to act accordingly to them. Basically, what if I was able to make such good plans that everything would fall in place? However, the thing I want to explore with her is the overthinking aspect of myself and the constant hesitation of not feeling like I can proceed with the plan unless everything is accounted for. As a possible addition, I want to sort of argue that even if you had the highest ability of rationalization, you cannot account for every single possible thing. Sometimes, it is dependent on your own beliefs and the sheer determination to make them into reality. A key thing I will probably explore for Claire is what will she do when faced with a dead end scenario. Maybe something like an inevitable death? How do you convince someone who is more than likely going to die that there is still hope? How do I convince her that by giving into the limiting belief ensures a sort of self fulfilling prophecy? Claire’s main motif is a visual calculus prediction combined with her sniper where she must get an overwhelming amount of data to execute to execute a single precise move. </p>\n<p>- A fun scene I want to write into the story is where Claire shoots several bullets out of the air. </p>\n<p>Roxana is more so a more confident version of myself in that she has a more unyielding tenacity and conviction in herself. Even though she is physically impaired (tbd, probably has severe burns on her arms), she continues to push herself to overcome those limitations and will not burden others with these limits. The issue is, having that much conviction in yourself can backfire if you don’t have anyone to fall back on. I want to show that despite being such an independent person, there is no replacement for human connection. She is basically what I envy from very confident and amazing people who have actualized their full identity into the world and become a shining symbol for others. Her main motif is that of a small flame or a spark where she seems to not have much actual intensity, but proceeds to burn as bright as she can in a lonely, dark world. </p>\n<p>- A likely scene to add is one where Roxana loses the ability to use her entire body properly. This is due to the antagonist removing her memories of core mobility functions (temporarily?). </p>\n<p>After some further reflection on my own writing so far for this idea of Remember Rain, there seems to be a through line that focuses on this idea of requiring further self understanding of my self or needing some justification before taking action. Almost as if I need an entire thesis or provable valid set of reasons before I can actually commit to a specific goal. “Waiting to feel morally justified before acting as yourself.” This sentence has made it all click in my mind in that I continue to intellectualize and think so much on how to do things in a way that will justify myself to everyone else around me. </p>\n<p>I felt stagnant and lost for a time, but never really forgot all the things I want to do. The issue is, a lot of what I value seemingly conflicts with each other:</p>\n<p>- Identity vs responsibility, </p>\n<p>- truth vs stability, </p>\n<p>- movement vs safety</p>\n<p>I initially thought I was trying to find myself; to find that “thing” that I am fully aligned with and can stick to. Instead, I am learning that I am sort of trying to earn the right to exist as myself without apology. This idea on the surface doesn’t seem to be something I struggle with. I do things I like for example watching anime, yapping on stream, singing to myself, etc. But I actually struggle with these things in the sense that I am doing these things out of comfort. What I need is to become someone who can be unfiltered in their self expression; where I pursue deeper ambitions in spite of any fears and stakes trying to sway my actions away from trying. I must do things in spite of being ready or having complete understanding. To allow myself to take a chance on the pursuits with the highest stakes and fully exist as my most authentic self. </p>\n<p>What is more apparent is that commitment is the single most important thing I need to focus on. Even though I sort of already knew this, it hasn’t been so clear until now after seeing all of the writing and self work I’ve done over the past 2 years. A linking idea to this is this idea that I like imagining that I have infinite potential just like everyone else; however, I cling to this idea of potential so much that I don’t want to commit to a thing to limit myself. I hesitate because the thing I fear most isn’t failure (even though that’s what I always thought it was), it is irreversible action. </p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","rain","rain-seed-1"]},{"slug":"rain-seed-2","title":"Rain - Seed 2","body":"<p>All right, so who exactly is Rain? Well, Rain is definitely just an analog for myself. A boy who dreams really big but feels like he needs to be justified before acting. Now what does this mean? Because I&#39;m starting to see through lines, but I question myself. And this, truly, I guess, is my core issue. Because I am incredibly—okay, maybe not incredibly—but I am lazy. Now I know this is more of like a mindset different, but that&#39;s kind of the truthful thing. But why? I&#39;m not necessarily lazy when it comes to, let&#39;s say, working at my job and actually focusing on, you know, all the tasks that are needed for me. But when it comes to my own personal life—example of driving myself to properly work on, say, writing this book or learning Japanese—I hesitate, or I spend too much time thinking about it or researching rather than actually doing it.</p>\n<p>But why is that? I think it kind of goes back to that specific through line that was mentioned, which is that I need some sort of justification, some sort of proof or signal, before I can actually follow the real desire. Does that mean I need a guarantee? Not necessarily. Because then I used to try to work on a video game back then, and even though I did dev logs and all that, it was during the moment—it was a nice feeling to come to work towards that dream of making a full game. I think it was a multiplayer game, but that&#39;s besides the point. I used to have that, I guess, carefree feeling of working on something that matters to me, rather than what could this thing bring to me, like some sort of, I guess, monetary gain or just any guarantee afterwards.</p>\n<p>Now, have I lost that sort of feeling? I don&#39;t think so. For example, with the L file site—the So Good Database—what is a project that I worked on and spent a lot of time on. And despite using, you know, AI tools or whatnot, I still had to really push through and make it a reality. And now it is. And what did I get from it? Maybe some a little bit of help, but realistically not really that much. I think now I&#39;m at that point where it is more like a sense of achievement. Like, &quot;Oh, I created this thing that doesn&#39;t exist,&quot; and for me, that is fulfilling. But I still have yet to write a whole book. Perhaps there&#39;s a little bit of distraction. I don&#39;t necessarily think so, but I don&#39;t know. Maybe it&#39;s like a simplified, or rather easier, thing to work on because, like I said, I kind of vibe coded that. Whereas with writing, yes I can use AI—which I am kind of using only to structure my thoughts but not necessarily to pick the ideas. Because yes, it&#39;s been clear that a lot of idea, let&#39;s say AI ideas, they get very—I don&#39;t know what&#39;s the word—streamlined, I guess. Simplified, I think that&#39;s the thing. And in a lot of, in some cases it&#39;s very precise and aligned, and then in others it&#39;s kind of skewed. And it&#39;s kind of getting to a point where it&#39;s a little bit hard to figure out what sort of matters and isn&#39;t necessarily my vision, if you will.</p>\n<p>Now, what is it that future me—or rather, I want to see out of Rain, or more so to see out of myself? I want to become that person who is unburdened by doubt, by external validation, by distraction. And that I can actually focus and create the things that matter to me rather than being stuck in a loop my whole life. That&#39;s sort of the point of why I&#39;ve done, arguably, some reckless things. I would say not necessarily reckless, but others would probably call it reckless. Let&#39;s say quitting my job and trying to move into learning Japanese. All those aim to push me out of my current zone because that is the one thing I&#39;ve identified: I&#39;ve been finding myself in a little bit of comfort. It&#39;s time to change on that.</p>\n<p>Now, I&#39;m trying to locate what sort of past experiences have led me to this point. It&#39;s kind of hard to really identify, but some things I can recall include being kind of gifted and talented during elementary school. I guess that sort of feedback turned me incredibly lazy during middle school, and that sort of persisted through high school. Another thing to note is after elementary school I was mostly sort of the outsider because I would have to commute, so I could not take part in any of the afterschool activities. And instead of doing all those activities, I&#39;d rather go on the computers in the library or watch TV and immerse myself in either cool stories or fun video games like Roblox. I think in terms of the artistic side, definitely more on the dreamer&#39;s level of things rather than the actual doing.</p>\n<p>I do have a memory of taking an art class in middle school and really not liking it because it was very rigid in its teaching. Like, yes we need to learn the foundational stuff, but I&#39;m not sure what it was. Maybe it&#39;s &#39;cause I did not realize the whole point of art is to do whatever you want, but I felt very limited to be in that class, to have to do the specific thing of &quot;you need to make a portrait&quot; or this assignment. I didn&#39;t really identify that it could&#39;ve been a portrait of anything rather than whatever it is—I guess more efficient or is more direct portrait of a thing, of a person. Why not? So there is that kind of a big thing in my life.</p>\n<p>And I wonder what it is with it. My current guess could be, since I sort of grew up without too much tech and had to sort of settle with, I guess, the older things and whatnot, whenever I had the opportunity to interact with a computer or one, I would try to save it, try to actually learn and do some fun things. Like when someone at my school found out I could boot up an emulator, I&#39;d be trying to figure out how they did that. Some other creative things I can recall—or this is not really a creative thing—but I distinctly remember being really enveloped in the idea of Greek mythology after reading, probably, Percy Jackson but also learning about Greek myths in—I&#39;m not entirely sure where—maybe in a class or something. But the Greek myths really fascinated me, all these stories of gods and whatnot doing insane stuff.</p>\n<p>A real creative thing I sort of did was trying to make Duel Disks during elementary school and have a fun day creating a little physical replica. That thing is from a series I like which is Yu-Gi-Oh! at the time. I mean, I still like it now. But it&#39;s interesting to say I would make them out of paper clips and paper. I think I would sell them for the school&#39;s currency or something.</p>\n<p>Make sure artistic goals, I&#39;d say it only really developed during creating something. And that initially turned into video game making, an online experience. Or not initially, it was seen from RPG Maker into Roblox, a little bit of Unity. But at the end point I realized, well, yes, I don&#39;t wanna make a game. I think the primary focus at this point is a story. That&#39;s the thing I identified through it all. For me, more than that, it is this idea of making a meaningful story, one that gives me the same level of impact as say games I played like Persona or as imaginative and fun as Five Days. So I return to the idea of needing permission sort of in my life. Meaning for sure there&#39;s this idea of permission to do anything really. Like needed permission before, or rather needed to check with my parents if they were okay with, say, me staying after school. And often times that wouldn&#39;t work with the schedule. So I think part of the thing might be that sort of assumed—assumed that they would be busy all the time. Moreover, I do not want them to be burdened by an additional ask. I wanted no sense—I think I accepted this idea that even though my parents support it, it&#39;s more like I have to figure out everything on my own. So there&#39;s that sense of self-authority that I had to manage.</p>\n","created":"April 10, 2026","modified":"May 23, 2026","path":["characters","rain","rain-seed-2"]},{"slug":"rain-trait-pair","title":"Rain - Trait Pair","body":"<p>Main Trait: Procrastinator</p>\n<p>Passive Trait: Dreamer</p>\n<p>Tag: The Paralyzed Dreamer</p>\n<p>Abstract Role: Heart</p>\n<p>Age: 23</p>\n<p>Height: 5&#39;7&quot;</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","rain","rain-trait-pair"]}],"subfolders":{}},"roxana":{"slug":"roxana","title":"Roxana","files":[{"slug":"roxana-abilities","title":"Roxana - Abilities","body":"<p>Passive – Empathic pain amplified when she feels vulnerable or others nearby are suffering. Particularly sensitive due to having burns all over her arms.</p>\n<p>Active – Flame: Conjure a small, tenacious flame fueled by her own body heat. The flame cannot be extinguished by water, wind, or smoldering. Extended use causes hypothermia. </p>\n<p>Can only be produced through her artifact (an empty lighter her adoptive father Aster Sparks gave her). Reacts to her physical gestures from primarily her hands, but can still move the flame with broader body movements. </p>\n<p>Advanced ability: ?</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","roxana","roxana-abilities"]},{"slug":"roxana-artifact","title":"Roxana - Artifact","body":"<p>Lighter</p>\n<p>- Empty on fuel. Given by Aster as a keepsake of something important that he wanted her to hold onto.</p>\n<p>- Looks like a worn down zippo lighter</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","roxana","roxana-artifact"]},{"slug":"roxana-layer-table","title":"Roxana - Layer Table","body":"<p>Layer 1 (Immediate): Guarded, clipped, “I’m fine.” When alone: gentle, traces fire‑patterns in the air. </p>\n<p>Mid‑dark, transparent.</p>\n<p>Layer 2 (Situational): Pushes people away; scars ache when others suffer nearby. </p>\n<p>Dark, semi‑transparent.</p>\n<p>Layer 3 (Foundational): Wants to be what her adoptive father Aster Sparks was — a protector, a light. Fears she already failed; the burns are the proof. </p>\n<p>Very bright, very obscure.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","roxana","roxana-layer-table"]},{"slug":"roxana-seed","title":"Roxana - Seed","body":"","created":"April 8, 2026","modified":"May 23, 2026","path":["characters","roxana","roxana-seed"]},{"slug":"roxana-trait-pair","title":"Roxana - Trait Pair","body":"<p>Main Trait: Loner / Warden (watchful, guarded)</p>\n<p>Passive Trait: Ember / Aspirant (wants to be a star, fears she’s too damaged)</p>\n<p>Tag: The Scarred Star</p>\n<p>Abstract Role: Body</p>\n<p>Age: 27–28</p>\n<p>Height: 5’6”</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","roxana","roxana-trait-pair"]}],"subfolders":{}},"shiori":{"slug":"shiori","title":"Shiori","files":[{"slug":"shiori-abilties","title":"Shiori - Abilties","body":"<p>Passive – Afterimage: She sees the emotional residue of recent memories as faint colors/sensations around people? Not sure yet</p>\n<p>No active ability. No artifact. She compensates with gadgets.</p>\n<p>Her gadgets are her external memory. She constantly attempts to record the present moment as she often forgets what has recently occurred.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","shiori","shiori-abilties"]},{"slug":"shiori-layer-table","title":"Shiori - Layer Table","body":"<p>Layer 1 (Immediate): Restless, probing, asks the wrong questions. </p>\n<p>Bright, extremely transparent.</p>\n<p>Layer 2 (Situational): Builds janky gadgets to record, track, and remember; iterates relentlessly. </p>\n<p>Mid‑bright, semi‑transparent.</p>\n<p>Layer 3 (Foundational): Terror of disappearing. Hidden journal of thoughts and poems.</p>\n<p>Very dark, very obscure.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","shiori","shiori-layer-table"]},{"slug":"shiori-trait-pair","title":"Shiori - Trait Pair","body":"<p>Main Trait: Invasive</p>\n<p>Passive Trait: Forgetful</p>\n<p>Tag: The Fragmented Recorder</p>\n<p>Abstract Role: ?</p>\n<p>Age: 22–24</p>\n<p>Height: 5’5” or 5’8”?</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","shiori","shiori-trait-pair"]}],"subfolders":{}},"vesper":{"slug":"vesper","title":"Vesper","files":[{"slug":"vesper-abilities","title":"Vesper - Abilities","body":"<p>Passive – Involuntary flashbacks of his own and extracted memories.</p>\n<p>Active – Extraction: Pulls a memory into a glass shard. Shatter the shard to return the memory. Cost: neural echoes (migraines, vertigo). He can borrow the skills contained in a memory while the shard is intact.</p>\n<p>Advanced – Melt: Permanently internalizes a memory; the original owner loses it forever. Cost: accelerated neural damage, identity fragmentation, loss of parts of his own memories.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","vesper","vesper-abilities"]},{"slug":"vesper-character-chain","title":"Vesper - Character Chain","body":"<p>History - Born with perfect memory. Mother was a puella aeternus: charming, full of potential, never committed, left chaos, and finally made an irreversible mistake that destroyed something Vesper loved. Vesper has carried that guilt and memory ever since.</p>\n<p>Interpretation (Lie) - “Painful memories are the root of all suffering. Remove them, and you create peace. People cannot change on their own; they need to be forced. The only way to have control is to become the very thing I hate – someone who takes away choice.” (Contradiction: he wants to free people, but enslaves them to his will.)</p>\n<p>Motivation (Fear &amp; Fix)\t</p>\n<p>- Fear: That he is secretly like his mother – full of potential but destined to cause destruction. That suffering is endless and he is powerless to stop it. </p>\n<p>- Fix: Force results, control everything, never leave anything unfinished. Extract all painful memories from society (or absorb them into himself) to create a docile, pain‑free world. Prove he is different from his mother by eliminating the messiness of human choice.</p>\n<p>Behavioral Pattern\t - When faced with suffering → immediately offers extraction (his fix). When someone refuses his help → becomes manipulative, then coercive. When his plan is threatened → escalates (extraction → absorption → mass extraction). Cannot tolerate ambiguity – must have a controlled outcome.</p>\n<p>Boundary - “I will not erase my own memory of what my mother did. That memory is my wound, but it’s also the only proof that I’m not her. Without it, I wouldn’t know why I started – and I’d become just as hollow as the people I ‘help.’”</p>\n<p>Collision - Rain refuses Vesper’s offer of memory extraction – not out of fear, but out of a genuine belief that struggle is valuable. Vesper cannot comprehend this because his entire worldview is built on the assumption that pain must be erased. This forces Vesper to confront the possibility that his mother’s tragedy could have been avoided not by erasing memories, but by doing the drab work of being present.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","vesper","vesper-character-chain"]},{"slug":"vesper-layer-table","title":"Vesper - Layer Table","body":"<p>Layer 1 (Immediate): Calm, gentle, reasonable. “I can help you become who you’re meant to be.” </p>\n<p>Bright, transparent.</p>\n<p>Layer 2 (Situational): Extracts memories to correct flaws. Reshapes identity by removing what he judges to be broken. </p>\n<p>When someone resists his perspective, he reframes their resistance as confusion. &quot;You&#39;re not ready yet.&quot;  </p>\n<p>Dark, semi‑transparent.</p>\n<p>Layer 3 (Foundational): Mother‑wound. She was an puella aeternus whose formlessness caused tragedy. He reforms others to prove he’s not her, yet clings to her memory as the one shard he won’t melt. </p>\n<p>Very dark, very obscure.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["characters","vesper","vesper-layer-table"]},{"slug":"vesper-seed","title":"Vesper - Seed","body":"<p>## Overview</p>\n<p>Direct antagonist of the story. He initially is part of the party near the start of the story but eventually betrays them as the rest do not align directly with his goals.</p>\n<p>Vesper has the ability to extract decision memories, memories where a conscious choice was made.</p>\n<p>## Expression</p>\n<p>I am considering if he should be closer to Roxana’s age (late 20s) or significantly younger (around 18). I’m thinking he’ll be 18 to symbolize a more sped up maturity that can be twisted when no support is available or anything inspirational was held within his mind. I feel that I myself have a sort of continuous feeling that I want to be hopeful and have a need to become fully actualized. What if I didn’t have this or possibly felt the weight of this a little too much?</p>\n<p>I am thinking Vesper will be a twist antagonist for the story and the big reveal will be that he has the ability to extract people’s memories (but not his own). To add to the potential foreshadowing, I want Vesper to forget recent events/things after each time he extracts a person’s memories. </p>\n","created":"April 8, 2026","modified":"May 23, 2026","path":["characters","vesper","vesper-seed"]},{"slug":"vesper-characterization","title":"Vesper Characterization","body":"<p>Main Trait: Reformer</p>\n<p>Passive Trait: Martyr</p>\n<p>“The Reforming Martyr”</p>\n<table>\n<thead>\n<tr>\n<th align=\"left\">Layer</th>\n<th align=\"left\">Expression</th>\n<th align=\"left\">Bright/Dark</th>\n<th align=\"left\">Transparent/Obscure</th>\n</tr>\n</thead>\n<tbody><tr>\n<td align=\"left\">Layer 1 (Immediate)</td>\n<td align=\"left\">Calm, reasonable, helpful. &quot;I can help you become who you&#39;re meant to be.&quot;</td>\n<td align=\"left\">Bright</td>\n<td align=\"left\">Transparent</td>\n</tr>\n<tr>\n<td align=\"left\">Layer 2 (Situational)</td>\n<td align=\"left\">Extracts memories to correct flaws. Reshapes identity by removing what he judges to be broken.  When someone resists his perspective, he reframes their resistance as confusion. &quot;You&#39;re not ready yet.&quot;</td>\n<td align=\"left\">Dark</td>\n<td align=\"left\">Semi-Transparent</td>\n</tr>\n<tr>\n<td align=\"left\">Layer 3 (Foundational)</td>\n<td align=\"left\">Mother was someone who never committed. Her formlessness caused irreversible harm. Vesper fears he is the same. His reform of others is proof to himself that he is different — he acts, he changes things, he is not her.  But the one memory he won&#39;t melt is hers. It&#39;s the evidence. Without it, he might forget who he&#39;s trying not to become</td>\n<td align=\"left\">Very dark</td>\n<td align=\"left\">Very obscure</td>\n</tr>\n</tbody></table>\n<p>Vesper’s combat style is that of a composite fighter. He is able to switch between styles based on the memories of those he’s extracted. Occasionally, echoes of the person’s memory appears briefly for the receiving end, almost as if they see an entirely different person in Vesper for a split second.</p>\n","created":"May 19, 2026","modified":"May 19, 2026","path":["characters","vesper","vesper-characterization"]}],"subfolders":{}}}},"locations":{"slug":"locations","title":"Locations","files":[{"slug":"setting","title":"Setting","body":"<p>What should the setting of my story take place in?</p>\n<p>Originally, my want was to make the story take heavy inspiration from the idea of steampunk aesthetics. There is something that speaks to me from that look; perhaps it’s the mechanical nature of things and the creative but somewhat grounded look of the technology there.</p>\n<p>What I’ve been heavily interested in was this idea of making the setting take place in an impossible location. Think Las Vegas, where the city is a “paradise” that was built in the middle of the desert. My current idea is a city that is built on an island that constantly rains. I’m thinking of combining this with the sort of mythological advancement of Atlantis. It’s a city that thrives from the water in spite of the intense environment it is in.</p>\n<p>I am also considering to have the city be built within or near a dormant volcano… not really sure why outside of it being a cool environmental addition. The city resides on a large island similar to Japan, but not sure on if this will be the case (mainly due to not sure if I’m not inspired enough or it’s something in me that wants to combine Japan into the setting). Upon further inquiry, I am learning that having a dormant volcano could be an interesting environment piece to display metaphorically how my life is built. My life is built upon a dormant volcano which has multiple magnitudes of potential; yet, I have not fully awakened to it. The city is beautiful, yet it is more of a “stable” beauty where it’s missing (or rather, only has hints of) a chaotic display of an even greater beauty. Yes, I could just be satisfied with the privileged life I’ve been granted up until now. However, it is something I myself am not satisfied with as I know there’s so much outside of my own perceived world that I’ve yet to truly experience. </p>\n<p>The biggest issue right now is determining if Rain was growing up within this new city or some circumstances allowed him to move there recently. I myself am trying to move to Japan so there’s an aspect where I could make the city symbolize the change that challenges Rain (more like he moves to there as an independent act at the start of the story). Problem is, that sort of contradicts the big part of the story that I want to express in that everything that once viewed him good immediately turns on him (not directly, but unknowingly like from false media or half truths of what he did).  </p>\n","created":"March 6, 2026","modified":"May 15, 2026","path":["locations","setting"]}],"subfolders":{}},"lore":{"slug":"lore","title":"Lore","files":[],"subfolders":{"magic-system":{"slug":"magic-system","title":"Magic System","files":[{"slug":"advanced-actives","title":"Advanced Actives","body":"<p>Advanced or evolved active abilities transform the cost rather than removing it. The transformation reflects the character&#39;s growth or descent. </p>\n<p>Example: Rain&#39;s base Clone causes acute sensory deprivation. His Perfect Clone removes the immediate sensory cost but introduces a deferred psychological cost. The cost changes form; it does not disappear. </p>\n<p>Some advanced abilities are additions to the base form (Vesper can still shatter or melt); others are irreversible transformations (Rain&#39;s Clone becomes the Perfect Clone; he cannot revert).</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["lore","magic-system","advanced-actives"]},{"slug":"artifacts-origins-and-nature","title":"Artifacts - Origins and Nature","body":"<p>Artifacts are ordinary objects. Not inherently magical. During the Flare, objects that witnessed an irreversible human commitment absorbed a latent trace of that moment—not as power, but as memory. This trace is dormant.</p>\n<p>When a person actively confronting their wound encounters an object whose latent memory echoes their own struggle, resonance occurs. The object becomes a focus. It channels the passive into the active. The power is the user&#39;s. The artifact is the lens. The object is not special. The connection is. The user recognizes themselves in what the object represents—a found medium, a story that speaks to them.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["lore","magic-system","artifacts-origins-and-nature"]},{"slug":"artifacts-permanance","title":"Artifacts - Permanance","body":"<p>The active ability cannot be accessed without the artifact. Not weakly, not partially—not at all. The artifact is not a training wheel. It is the instrument. If lost or destroyed, the user reverts to passive only until the artifact is recovered or a new resonant object is found and bonded.</p>\n<p>Exception: in moments of extraordinary emotional or physical extremity, a raw expression of the passive may briefly manifest without the artifact. This is not controlled, not repeatable, and comes at severe cost (see: Roxana&#39;s prison spark). The artifact remains essential for all deliberate, sustained active use.</p>\n<p>The artifact may deepen in attunement over time, reflecting the user&#39;s growth, but is never made obsolete.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["lore","magic-system","artifacts-permanance"]},{"slug":"costs-general-rule","title":"Costs - General Rule","body":"<p>All active abilities have a self-affecting physiological cost. The cost is a metaphor for the emotional toll of the wound being channeled. It scales with use—the longer or more intensely the ability is active, the greater the cost. Recovery is possible but not instant. The cost cannot be bypassed; it can only be endured or transformed (see Advanced Abilities).</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["lore","magic-system","costs-general-rule"]},{"slug":"magic-overview-reference","title":"Magic Overview Reference","body":"<p>The Flare</p>\n<p>A global phenomena that occurs which exposes the entire world with an unseen energy. This energy does not affect most people, but affected those who have an actively trying to change. The energy has an attribute of resonance which clings onto those who are actively moving towards confronting themselves rather than those who are actively avoiding change; those who are stagnant and accept that will never awaken to any special ability. In addition to affecting certain individuals, the energy from the flare latched onto the water within a dormant volcano near the city the story takes place in. This was due to the water within the volcano meeting specific conditions (a largely contained circulating water source that absorbed a high concentration of the flare’s energy). As a result, the nearby city found that the water from the volcano can be used as a reusable energy source so long as it is properly circulated. The water enables amplified motion that allows it to output significant kinetic power within a closed pathway system. </p>\n<p>Passive and Active Abilities\t</p>\n<p>The energy from the Flare affected those who were trying to confront themselves, which resulted in a passive quirk/burden that affects them. It is a passive ability based on the character’s deepest internal conflict that manifests without conscious control. The passive can only be perceived by them.</p>\n<p>As for active abilities, they are awakened once the user encounters an artifact that resonates with their core being. It is a unique ability that has a physiological cost (a metaphor for the emotional cost) which is shaped by intent. </p>\n<p>The through line for the design of powers in this magic system is they are all forms of internal processing.</p>\n<p>Generally, the passive is an extended psychological burden while the active is a tool/skill that takes a physiological toll on the user.</p>\n<p>1. All powers are sourced from each character’s way of internally processing their core psychological wound (Rain from his own perception of himself, Roxana from her body heat, Claire from her brain’s calculations, Vesper from his memory within his psyche)</p>\n<p>2. There is a self-affecting physiological cost when using the active abilities</p>\n<p>3. Passive abilities are the same internal processing of the core wound but in a more raw and unfocused way. </p>\n<p>4. The artifact does not grant new powers but rather channels the existing passive ability into a more intentional form.</p>\n<p>5. No permanent physical change is made to the world. Memory and identity, however, can be permanently altered — this is the exception. Each active ability temporarily manifests something if applicable.</p>\n<p>6. Tied to the core wound of the character</p>\n<p>7. Advanced or evolved active abilities have their cost transformed reflecting the character’s growth or descent. That or their ability is refined but with the same or similar original cost.</p>\n<p>Artifacts are physical objects that were part of an irreversible human commitment during the Flare. The energy imprinted on them not because they were in motion, but because they were touched by a decisive act — someone running toward danger, reaching to save, staying when others fled. An artifact carries the memory of that moment. When a person on the verge of their own commitment encounters a matching artifact, resonance occurs. The object channels the passive into the active. The artifact does not grant power; it focuses what is already there.</p>\n<p> \t</p>\n<p>Rain’s Ghost/Clone</p>\n<p>Passive: Rain sees a ghost of himself - a translucent afterimage visible only Rain can see. It appears at meaningful thresholds between commitment and retreat, performing a single repeated action: a step forward with an open hand reaching towards what Rain’s deepest self truly wants to do, regardless of risk or consequence.</p>\n<p>When Rain wears his artifact (goggles), the Ghost becomes sharper and more distinct. The goggles channel the passive into the active, and as a side effect, the Ghost is more clear which makes it harder for Rain to ignore.</p>\n<p>Active: Rain along with his artifact can create a distinguishable intangible clone of himself that does a singular action based on his intent. The drawback is that Rain loses his senses scaling with duration; he is losing his feelings to the present experience in real time. Mostly escalates from blurred vision and ringing ears to temporary blindness/deafness and possible collapse due to not feeling his own presence at all (losing himself or his feeling of ego?). He recovers around 10-30s shortly after dismissing the clone.</p>\n<p>Advanced Active: The clone is indistinguishable from Rain entirely and emulates the physics around to create perfect, still intangible, illusion. Immediate sensory cost seems to be removed entirely; however, each use leaves a fragment of his Ghost’s internal voice (Procrastinator self talk) which grows in autonomy and persuasion upon each use. His old self, refusing to die quietly. Cost hinted at near the end of Remember Rain which will be explored in the future if there’s a sequel.</p>\n<p> \t</p>\n<p>Roxana’s Flame</p>\n<p>Passive: Her pain ( or rather her sensitivity to pain) is amplified when she feels vulnerable, dependent, or tempted to connect. She in turn avoids encounters that let her do this as she has burns on her arms from a previous accident/event.</p>\n<p>Active: Conjure a small flame that cannot be extinguished by normal means and can be manipulated slightly. Flame lingers for a bit if fuel source disappears which means it can be placed. The drawback is that the flame’s direct fuel to sustain is Roxana’s own body heat. Extended use can lead to hypothermia and overuse can lead to unconsciousness.</p>\n<p> \t</p>\n<p>Claire’s Visual Calculus</p>\n<p>Passive: Intrusive anxiety from overthinking after a choice she’s made. Constant, literal noise of information. It is a sort of static that floods her hearing constantly, but she’s learned to live with the background hum of most decisions. This spikes when she makes a more scary decision (how much she personally fears the outcome).</p>\n<p>Active: Claire can process information at a superhuman speed to calculate trajectories, angles, probabilities, and execute precise actions (visually shown to only her like visual calculus diagrams). Visually, it looks like a bunch of overlapping possibilities simulate within her vision until it reaches a result that aligns with her intent (everything is silent during the ability; once complete, she hears a click). However, this comes at a cost of deferred exhaustion in the form of a metabolic crash (brain glucose depletion, i.e. significant use of brain energy in a short amount of time). She may collapse shortly after using the ability on a very complex task; shorter / less complex use has her have tremors, cold sweats, mental fog.</p>\n<p>Advanced Active: Claire’s active transforms into more of an instinctive passive that allows her to react to things within a short range almost immediately but effortlessly. Basically a form of ultra instinct where the calculations occur without Claire actively having to focus on it. (Needs rework due to cost transformation rule to the magic system)</p>\n<p> \t</p>\n<p>Vesper’s Memory Extraction</p>\n<p>Passive: Vesper experiences involuntary flashbacks — his own memories and those he has extracted, bleeding together without distinction. The flashbacks are not under his control. They are the price of carrying so many selves inside one mind. His mother&#39;s memory is the most persistent.</p>\n<p>Active: Vesper can extract the memories of others and turn them into glass shards. These glass shards can be shattered to return the memories to the original owner. </p>\n<p>During the act of extraction, Vesper experiences neural echoes that strains his brain’s functions to the point of migraines, vertigo, tremors, etc. ?</p>\n<p>Advanced Active: Vesper can melt a shard to permanently internalize a memory which causes the memory to be fully lost for the original owner. The cost is increased for Vesper in that he experiences accelerated neural damage leading to identity fragmentation and the permanent loss of parts of his own memories. He is a collector who hoards what he claims to abolish — and the hoard is destroying him from within.</p>\n","created":"December 19, 2025","modified":"May 23, 2026","path":["lore","magic-system","magic-overview-reference"]},{"slug":"memory-exception","title":"Memory Exception","body":"<p>Rule: No ability causes permanent physical change to the world. Memory and identity are the exception. Vesper&#39;s advanced active (Melting a shard) permanently erases a memory from the original owner. This is the only form of permanent, irreversible alteration in the magic system. It is thematically central: memory is the record of the self. To destroy it is to destroy evidence of commitment. This exception is what makes Vesper&#39;s power uniquely transgressive.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["lore","magic-system","memory-exception"]},{"slug":"passive-vs-active","title":"Passive vs Active","body":"<p>Passive: raw, unfocused expression of the wound. Always present. Cannot be controlled. Perceived only by the user. A burden, a signal, a mirror.</p>\n<p>Active: the wound channeled into deliberate form through an artifact. Shaped by intent. Has a physiological cost tied to the wound. Requires the artifact to function—without it, only the passive remains.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["lore","magic-system","passive-vs-active"]},{"slug":"resonance-and-awakening","title":"Resonance and Awakening","body":"<p>The Flare&#39;s energy carries an attribute of resonance. It clings to those actively trying to change. People who are stagnant, who accept their stasis, never awaken. Awakening is not a reward—it&#39;s a reflection of an already-active internal struggle. The passive ability is the first sign: a raw, unfocused expression of the core wound. Only the user can perceive it.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["lore","magic-system","resonance-and-awakening"]},{"slug":"the-flare","title":"The Flare","body":"<p>The Flare - A global event. Unseen energy swept the world. It resonated with those actively confronting themselves—moving toward change, not stagnant. The energy also infused the water within a dormant volcano, creating the Sacred Water. The Flare is not sentient; it&#39;s a force that responds to motion, to commitment, to the act of becoming.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["lore","magic-system","the-flare"]}],"subfolders":{}},"plot":{"slug":"plot","title":"Plot","files":[{"slug":"plot-ideas","title":"Plot Ideas","body":"<p>Rain sees an afterimage of his clone seemingly leading him towards a different path on his commute. This decision alone leads him to the inciting events of the story.</p>\n<p>Vesper seemingly acts differently during certain parts of the story. In terms of foreshadowing: he is forgetful of recent events/things after a recent memory extraction and will casually react to things based on memories he has already extracted from people. This will be based on the memory glass shards he’s collected up during the events of the story.</p>\n<p>Vesper is revealed to have the ability to extract memories and has done this for his own goals. He betrays the group; extracting Roxana’s important decisive memory of her past to cause her to physically be paralyzed. Claire is horrified of her mistake of trusting Vesper? Claire may have been assisting Vesper’s plans unknowingly due to her want to extract a memory that has plagued her mind throughout her life.</p>\n<p>Both Rain and Roxana are trapped within the sensory deprivation prison that’s designed to pacify inmates. Rain goes through a trial of facing his base core self. </p>\n<p>A scene that shows Rain on top of a mountain of bodies, bodies of himself, with him bloodied. Implies he had to kill all of his selves (potential selves) to become himself.</p>\n<p>Vesper is practically unbeatable by Rain not only due to having so much accumulated memories inside him, but the fact that Roxana’s core memory was extracted, which allows Vesper to fully predict Rain’s combat maneuvers as he was primarily trained by Roxana. </p>\n<p>Rain screws up and gives Vesper an opportunity to extract a memory of his. This causes an internal trial to occur where Rain faces his past. He is at a decision point of whether to accept the </p>\n","created":"May 15, 2026","modified":"May 19, 2026","path":["lore","plot","plot-ideas"]}],"subfolders":{}}}},"scenes":{"slug":"scenes","title":"Scenes","files":[],"subfolders":{}},"themes":{"slug":"themes","title":"Themes","files":[{"slug":"central-motif-memory","title":"Central Motif - Memory","body":"<p>Central Motif: </p>\n<p>Memory - A record of the self and is a proof of commitment. Removing it removes your identity. </p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["themes","central-motif-memory"]},{"slug":"character-motifs-overview","title":"Character Motifs Overview","body":"<p>Shared Sub Motifs: </p>\n<p>Rain / Water - Commitment as something you let fall on you rather than to avoid. Accumulation. Flow vs Stagnation.</p>\n<p>Falling - An irreversible act that can happen unexpectedly or through acceptance. Sometimes, you need to let yourself fall and take a risk.</p>\n<p>Character Specific Motifs</p>\n<p>Rain</p>\n<p>Ghost internal voice vs Clone deflection - Ghost is Rain’s inner true want from his Dreamer trait; constantly uses the Clone to pretend to feel like he has done action</p>\n<p>Vesper</p>\n<p>Glass - Vesper’s view on memory. A fragile piece of a person that can be extracted to reform/shape them into a “better” person. </p>\n<p>Roxana</p>\n<p>Small fire/flame - Roxana’s want to continue fighting in spite of her actual strength/power being weak. Shines within the darkness in spite of the dimming of her own light</p>\n<p>Claire</p>\n<p>Noise vs Silence - Claire’s overthinking intrusive mind vs the peace of certainty. Commitment quiets the noise temporarily.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["themes","character-motifs-overview"]},{"slug":"focus-questions","title":"Focus Questions","body":"<h3>1. The Inciting Incident (Most Critical)</h3>\n<p>You mention Rain makes &quot;a seemingly simple decision that leads to a life-altering decision that makes him a fugitive&quot; but this is completely vague. You need to answer:</p>\n<ul>\n<li>What specific action does Rain take?</li>\n</ul>\n<p>He takes a different path during his commute. This leads to an encounter where Rain willingly goes into a dark alleyway in an attempt to pursue a shadowy figure that silently calls to him (later revealed to be his subconscious taking form from his ability). He encounters something inspirational? Something that calls to him to take hold of it, likely the mirror </p>\n<ul>\n<li>Why does this make him a fugitive? (To whom? The government? Vesper&#39;s organization? Public opinion?)</li>\n</ul>\n<p>The government. They manipulate the story to where society itself is on the lookout for him as well. He is acting outside of the predictable norm and is designated as a fugitive. He is “disturbing the peace” in the sense that he is going against the comfort the society has established. Everything is fine and ignore the discrepancies in your comfortable reality.</p>\n<ul>\n<li>What are the immediate, tangible consequences?</li>\n</ul>\n<p>His family and/or close friends beg him to turn himself in. That he should admit his wrongs even though he has not done anything definitively wrong. </p>\n<h3>2. How Memory Manipulation Works</h3>\n<p>Right now it&#39;s purely metaphorical. You need rules:</p>\n<ul>\n<li>Can Vesper literally erase memories? Implant false ones?</li>\n</ul>\n<p>Vesper can extract memories from himself and others and turn them into glass shards. When the glass shards are shattered, they linger for a moment that grants an echo of the memories before returning to the owner’s mind. He holds the memories he’s stolen in a vault to prevent the memories from returning. However, Vesper finds a way to integrate and force certain memories into himself by melting the shards through a difficult process. </p>\n<ul>\n<li>Is this technology? Magic? Psychic ability?</li>\n</ul>\n<p>Part of the magic system. His deviation ability that’s extended by his </p>\n<ul>\n<li>What are the limitations? (Can he do it remotely? Does the person know? Is it permanent?)</li>\n</ul>\n<p>He must be within direct contact with the person in order to extract their memory. Vesper ideally does this stealthily. The memory loss is temporary and can be returned once the corresponding glass shard is shattered.t</p>\n<ul>\n<li>How does Rain discover this is happening?</li>\n</ul>\n<p>The Roxana scene you mentioned (losing mobility functions) suggests Vesper can target specific memories, but how does society not notice people having skills erased?</p>\n<p>Vesper wants to optimize people. So his offering of removing tragic/negative experiences is very enticing for most people. In return for this service, they serve him in being compartmentalized agents for him.</p>\n<h3>3. The World/Setting</h3>\n<ul>\n<li>When/where does this take place?</li>\n</ul>\n<p>On a large island (similar to Japan) that is inspired by the impossibility of Las Vegas and the futuristic ideal of Atlantis before its disaster. </p>\n<ul>\n<li>Is memory manipulation known to the public or secret?</li>\n</ul>\n<p>No, this is simply an oddity that isn’t revealed until past the midpoint of the story.</p>\n<ul>\n<li>What is Vesper&#39;s position in society that allows him to do this?</li>\n<li>Why does this make Rain specifically a fugitive vs. just another victim?</li>\n</ul>\n<h3>4. Claire and Roxana&#39;s Plot Functions</h3>\n<p>You know what they represent thematically, but:</p>\n<ul>\n<li>How do they meet Rain?</li>\n<li>What are their goals independent of Rain&#39;s story?</li>\n</ul>\n<p>To locate what happened to Aster Sparks, Roxana’s adoptive father.  </p>\n<ul>\n<li><p>Why do they join him/oppose Vesper?</p>\n</li>\n<li><p>What do they DO in the story?</p>\n</li>\n</ul>\n<p>They are idealized versions of what Rain aspires to be. </p>\n","created":"December 19, 2025","modified":"April 1, 2026","path":["themes","focus-questions"]},{"slug":"theme","title":"Theme","body":"<p>Theme: A self is built through irreversible commitment. Avoiding commitment — staying in the realm of infinite potential — is a slow self-erasure.</p>\n<p>Antithesis: Relief is real. Removing pain can feel like freedom. Sometimes it might even be better — for a moment, for some people, in the short term. But it hollows the self over time.</p>\n<p>A self is built through irreversible commitment.</p>\n<p>Avoiding commitment is slow self-erasure.</p>\n<p>Memory is the record of the self.</p>\n","created":"May 23, 2026","modified":"May 23, 2026","path":["themes","theme"]}],"subfolders":{}}}</script>  </main> <script type="module" src="/_astro/BaseLayout.astro_astro_type_script_index_0_lang.DQ3NqrlH.js"></script> <script type="module">const i=".bento-tile--interactive, .logo-tile, .image-tile, .title-tile";function n(){const t=document.getElementById("cursor");t&&(document.addEventListener("mousemove",e=>{t.style.left=`${e.clientX}px`,t.style.top=`${e.clientY}px`}),document.addEventListener("mouseover",e=>{const o=!!e.target.closest(i);t.classList.toggle("cursor--active",o)}))}window.__cursorInit||(window.__cursorInit=!0,n());</script> </body> </html>  <script type="module" src="/_astro/_...slug_.astro_astro_type_script_index_0_lang.BGyO8gf2.js"></script>
